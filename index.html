<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 كأس العالم 2026 - نتائج مباشرة</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
  :root {
    --gold: #C9A84C; --gold-light: #F0D080;
    --dark: #0A0E1A; --dark2: #111827; --dark3: #1C2537;
    --green: #00E676; --red: #FF5252; --blue: #4FC3F7;
    --text: #E8EAF0; --muted: #8892A4;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Cairo',sans-serif; background:var(--dark); color:var(--text); min-height:100vh; }

  header {
    background: linear-gradient(135deg,#0A0E1A,#1a1200,#0A0E1A);
    border-bottom: 2px solid var(--gold);
    padding: 18px 20px;
    display: flex; align-items:center; justify-content:space-between;
    position: sticky; top:0; z-index:100;
    box-shadow: 0 4px 20px rgba(201,168,76,.15);
  }
  .logo { display:flex; align-items:center; gap:10px; }
  .logo h1 { font-size:1.2rem; font-weight:900; background:linear-gradient(90deg,var(--gold-light),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .logo span { font-size:.7rem; color:var(--muted); }
  .live-badge { display:flex; align-items:center; gap:7px; background:rgba(0,230,118,.1); border:1px solid rgba(0,230,118,.3); border-radius:20px; padding:5px 12px; font-size:.78rem; color:var(--green); font-weight:700; }
  .pulse { width:7px; height:7px; background:var(--green); border-radius:50%; animation:pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.6)} }

  .timer-bar { background:var(--dark2); border-bottom:1px solid rgba(201,168,76,.08); padding:8px 20px; display:flex; align-items:center; justify-content:space-between; font-size:.75rem; color:var(--muted); }
  .cd-bar { width:100px; height:3px; background:rgba(255,255,255,.08); border-radius:3px; overflow:hidden; margin-right:8px; }
  .cd-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-light)); transition:width 1s linear; }

  .tabs { display:flex; gap:3px; padding:14px 20px 0; border-bottom:1px solid rgba(255,255,255,.05); }
  .tab { padding:9px 16px; border-radius:8px 8px 0 0; font-size:.82rem; font-weight:600; cursor:pointer; color:var(--muted); border:1px solid transparent; border-bottom:none; background:transparent; font-family:'Cairo',sans-serif; transition:all .2s; }
  .tab:hover { color:var(--text); }
  .tab.active { background:var(--dark3); border-color:rgba(201,168,76,.18); color:var(--gold-light); }

  .content { padding:20px; }
  .section-title { font-size:.68rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .section-title::after { content:''; flex:1; height:1px; background:rgba(255,255,255,.05); }

  .matches-grid { display:flex; flex-direction:column; gap:9px; margin-bottom:24px; }

  .match-card {
    background:var(--dark3); border:1px solid rgba(255,255,255,.06); border-radius:13px;
    padding:16px 18px; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:14px;
    position:relative; overflow:hidden; transition:border-color .2s,transform .15s;
  }
  .match-card:hover { border-color:rgba(201,168,76,.22); transform:translateY(-1px); }
  .match-card.live { border-color:rgba(0,230,118,.28); background:linear-gradient(135deg,var(--dark3),rgba(0,230,118,.03)); }
  .match-card.live::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:linear-gradient(90deg,transparent,var(--green),transparent); animation:shimmer 2s infinite; }
  @keyframes shimmer { 0%,100%{opacity:.3} 50%{opacity:1} }

  .team { display:flex; flex-direction:column; align-items:center; gap:5px; text-align:center; }
  .team-flag { font-size:2rem; line-height:1; }
  .team-name { font-size:.82rem; font-weight:700; }

  .score-center { display:flex; flex-direction:column; align-items:center; gap:4px; min-width:76px; }
  .score { font-size:1.9rem; font-weight:900; letter-spacing:.05em; color:#fff; }
  .score .dash { color:var(--muted); margin:0 3px; font-weight:400; }

  .match-status { font-size:.68rem; font-weight:700; padding:2px 8px; border-radius:5px; text-align:center; }
  .s-live { background:rgba(0,230,118,.12); color:var(--green); border:1px solid rgba(0,230,118,.25); }
  .s-fin  { background:rgba(136,146,164,.1); color:var(--muted); border:1px solid rgba(136,146,164,.12); }
  .s-up   { background:rgba(79,195,247,.1); color:var(--blue); border:1px solid rgba(79,195,247,.18); }

  .match-meta { font-size:.65rem; color:var(--muted); margin-top:2px; }

  .standings-table { background:var(--dark3); border:1px solid rgba(255,255,255,.06); border-radius:13px; overflow:hidden; margin-bottom:20px; }
  .standings-table table { width:100%; border-collapse:collapse; }
  .standings-table th { padding:9px 12px; text-align:center; font-size:.68rem; color:var(--muted); font-weight:600; background:rgba(0,0,0,.2); border-bottom:1px solid rgba(255,255,255,.05); }
  .standings-table th:first-child { text-align:right; }
  .standings-table td { padding:11px 12px; text-align:center; font-size:.82rem; border-bottom:1px solid rgba(255,255,255,.03); }
  .standings-table td:first-child { text-align:right; }
  .standings-table tr:last-child td { border-bottom:none; }
  .standings-table tr:hover td { background:rgba(255,255,255,.02); }
  .rank { color:var(--muted); font-size:.72rem; width:22px; display:inline-block; text-align:center; }
  .rank.top { color:var(--gold); font-weight:700; }
  .team-cell { display:inline-flex; align-items:center; gap:7px; font-weight:600; }
  .pts { font-weight:900; color:var(--gold-light); }

  .grp-label { display:inline-block; padding:2px 8px; background:rgba(201,168,76,.1); border:1px solid rgba(201,168,76,.18); border-radius:5px; font-size:.68rem; color:var(--gold); font-weight:700; margin-bottom:8px; }

  .loading { text-align:center; padding:50px 20px; color:var(--muted); }
  .spinner { width:36px; height:36px; border:3px solid rgba(201,168,76,.15); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 14px; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .err { background:rgba(255,82,82,.07); border:1px solid rgba(255,82,82,.2); border-radius:10px; padding:12px 15px; font-size:.8rem; color:var(--red); margin-bottom:14px; }

  .setup-box { margin:20px; background:var(--dark3); border:1px solid rgba(201,168,76,.25); border-radius:14px; padding:22px; }
  .setup-box h2 { color:var(--gold-light); margin-bottom:10px; font-size:1rem; }
  .setup-box p { color:var(--muted); font-size:.82rem; line-height:1.8; margin-bottom:14px; }
  .setup-box a { color:var(--gold); }
  code { background:rgba(0,0,0,.4); border:1px solid rgba(255,255,255,.1); padding:1px 6px; border-radius:4px; font-family:monospace; font-size:.78rem; color:var(--gold-light); }

  @media(max-width:480px) {
    .score { font-size:1.5rem; }
    .team-flag { font-size:1.7rem; }
    .team-name { font-size:.75rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span style="font-size:1.8rem">🏆</span>
    <div>
      <h1>كأس العالم 2026</h1>
      <span>نتائج مباشرة</span>
    </div>
  </div>
  <div class="live-badge"><div class="pulse"></div>LIVE</div>
</header>

<div class="timer-bar">
  <span id="lastUpdate">آخر تحديث: --</span>
  <div style="display:flex;align-items:center;gap:6px">
    <span id="nextTxt">التالي بعد 30 ث</span>
    <div class="cd-bar"><div class="cd-fill" id="cdFill" style="width:100%"></div></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('matches')">📅 المباريات</button>
  <button class="tab" onclick="showTab('standings')">📊 الترتيب</button>
</div>

<div class="content">
  <div id="tab-matches">
    <div id="errMsg" class="err" style="display:none"></div>
    <div id="matchesBox"><div class="loading"><div class="spinner"></div><p>جارٍ التحميل...</p></div></div>
  </div>
  <div id="tab-standings" style="display:none">
    <div id="standingsBox"><div class="loading"><div class="spinner"></div><p>جارٍ التحميل...</p></div></div>
  </div>
</div>

<script>
// =====================================================
// ضع هنا رابط مشروعك على Vercel بعد ما ترفعه
// مثال: const API = 'https://wc-api.vercel.app';
// =====================================================
const API = 'https://YOUR-PROJECT.vercel.app';
const REFRESH = 30000;
let timeLeft = 30;
let cdTimer, refreshTimer;

// ===== TABS =====
function showTab(t) {
  ['matches','standings'].forEach(n => {
    document.getElementById('tab-'+n).style.display = n===t ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active', ['matches','standings'][i] === t);
  });
}

// ===== FETCH =====
async function fetchMatches() {
  try {
    const r = await fetch(`${API}/api/matches?endpoint=matches&status=LIVE,FINISHED,SCHEDULED`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    renderMatches(d.matches || []);
    document.getElementById('errMsg').style.display = 'none';
  } catch(e) {
    document.getElementById('errMsg').style.display = 'block';
    document.getElementById('errMsg').textContent = '⚠️ ' + e.message + ' — تأكد من رفع المشروع على Vercel وتحديث رابط API';
  }
  updateTs();
}

async function fetchStandings() {
  try {
    const r = await fetch(`${API}/api/matches?endpoint=standings`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    renderStandings(d.standings || []);
  } catch(e) {
    document.getElementById('standingsBox').innerHTML = `<div class="err">⚠️ ${e.message}</div>`;
  }
}

// ===== RENDER MATCHES =====
function renderMatches(matches) {
  if (!matches.length) {
    document.getElementById('matchesBox').innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px">لا توجد مباريات</p>';
    return;
  }
  const live     = matches.filter(m => ['IN_PLAY','PAUSED'].includes(m.status));
  const upcoming = matches.filter(m => ['SCHEDULED','TIMED'].includes(m.status));
  const finished = matches.filter(m => m.status === 'FINISHED');

  let html = '';
  if (live.length)     html += section('🔴 مباشر الآن', live, true);
  if (upcoming.length) html += section('🕐 قادمة', upcoming.slice(0,8), false);
  if (finished.length) html += section('✅ منتهية', finished.slice(0,12), false);
  document.getElementById('matchesBox').innerHTML = html;
}

function section(title, arr, isLive) {
  return `<p class="section-title">${title}</p><div class="matches-grid">${arr.map(m=>card(m,isLive)).join('')}</div>`;
}

function card(m, isLive) {
  const live = isLive || ['IN_PLAY','PAUSED'].includes(m.status);
  const hs = m.score?.fullTime?.home ?? m.score?.halfTime?.home ?? null;
  const as = m.score?.fullTime?.away ?? m.score?.halfTime?.away ?? null;
  const scoreHtml = hs !== null
    ? `${hs}<span class="dash"> - </span>${as}`
    : `<span class="dash"> - </span>`;
  const sClass = live ? 's-live' : m.status==='FINISHED' ? 's-fin' : 's-up';
  const sText  = live ? `⚽ ${m.minute||''}` : m.status==='FINISHED' ? 'انتهت' : fmtTime(m.utcDate);

  return `
  <div class="match-card${live?' live':''}">
    <div class="team">
      <div class="team-flag">${flagEmoji(m.homeTeam?.crest) || '🏳️'}</div>
      <div class="team-name">${m.homeTeam?.shortName || m.homeTeam?.name || ''}</div>
    </div>
    <div class="score-center">
      <div class="score">${scoreHtml}</div>
      <div class="match-status ${sClass}">${sText}</div>
      <div class="match-meta">${m.group || m.stage || ''}</div>
    </div>
    <div class="team">
      <div class="team-flag">${flagEmoji(m.awayTeam?.crest) || '🏳️'}</div>
      <div class="team-name">${m.awayTeam?.shortName || m.awayTeam?.name || ''}</div>
    </div>
  </div>`;
}

// football-data يرجع رابط صورة للشعار — نحول رمز الدولة لإيموجي بديل
function flagEmoji(crestUrl) {
  if (!crestUrl) return '';
  // نعرض شعار الفريق كصورة صغيرة
  return `<img src="${crestUrl}" style="width:36px;height:36px;object-fit:contain" onerror="this.style.display='none'">`;
}

function fmtTime(utc) {
  if (!utc) return '';
  return new Date(utc).toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit',hour12:false});
}

// ===== RENDER STANDINGS =====
function renderStandings(standings) {
  if (!standings.length) {
    document.getElementById('standingsBox').innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px">لا توجد بيانات</p>';
    return;
  }
  let html = '';
  standings.forEach(g => {
    html += `<span class="grp-label">${g.group || 'المجموعة'}</span>`;
    const rows = g.table.map(t => `
      <tr>
        <td><span class="rank${t.position<=2?' top':''}">${t.position}</span>
            <span class="team-cell">
              <img src="${t.team?.crest||''}" style="width:18px;height:18px;object-fit:contain" onerror="this.style.display='none'">
              ${t.team?.shortName||t.team?.name||''}
            </span></td>
        <td>${t.playedGames}</td><td>${t.won}</td><td>${t.draw}</td><td>${t.lost}</td>
        <td>${t.goalDifference>0?'+':''}${t.goalDifference}</td>
        <td class="pts">${t.points}</td>
      </tr>`).join('');
    html += `<div class="standings-table" style="margin-bottom:14px">
      <table>
        <thead><tr><th>الفريق</th><th>ل</th><th>ف</th><th>ت</th><th>خ</th><th>±</th><th>نقاط</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
  });
  document.getElementById('standingsBox').innerHTML = html;
}

// ===== TIMESTAMP & COUNTDOWN =====
function updateTs() {
  document.getElementById('lastUpdate').textContent =
    'آخر تحديث: ' + new Date().toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  resetCountdown();
}

function resetCountdown() {
  clearInterval(cdTimer);
  timeLeft = REFRESH/1000;
  cdTimer = setInterval(() => {
    timeLeft--;
    document.getElementById('cdFill').style.width = (timeLeft/(REFRESH/1000)*100)+'%';
    document.getElementById('nextTxt').textContent = `التالي بعد ${timeLeft} ث`;
    if (timeLeft<=0) clearInterval(cdTimer);
  }, 1000);
}

// ===== START =====
fetchMatches();
fetchStandings();
clearInterval(refreshTimer);
refreshTimer = setInterval(() => { fetchMatches(); fetchStandings(); }, REFRESH);
</script>
</body>
</html>
